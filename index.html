<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swear Counter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .counter-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .counter-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .counter-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .counter-emoji {
            font-size: 2rem;
        }

        .counter-label {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
        }

        .counter-display {
            text-align: center;
            margin: 20px 0;
        }

        .count {
            font-size: 4rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .counter-buttons {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            color: white;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .increment-btn {
            flex: 2;
        }

        .global-stats {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .stats-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            color: #666;
        }

        .stat-value {
            font-weight: bold;
            color: #333;
        }

        .reset-all-btn {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
        }

        @media (max-width: 480px) {
            .count {
                font-size: 3rem;
            }

            .container {
                padding: 30px 20px;
            }

            .counter-emoji {
                font-size: 1.5rem;
            }

            .counter-label {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function SwearCounter() {
            const [config, setConfig] = useState(null);
            const [counts, setCounts] = useState({});
            const [sessionCounts, setSessionCounts] = useState({});
            const [startTime] = useState(new Date());
            const [firebaseInitialized, setFirebaseInitialized] = useState(false);
            const databaseRef = useRef(null);
            const listenersRef = useRef({});

            // Load config and initialize Firebase
            useEffect(() => {
                fetch('config.json')
                    .then(res => res.json())
                    .then(configData => {
                        setConfig(configData);

                        // Apply theme to body
                        document.body.style.background = `linear-gradient(135deg, ${configData.theme.primaryColor} 0%, ${configData.theme.secondaryColor} 100%)`;
                        document.title = configData.appTitle;

                        // Initialize Firebase if sharedCounters is enabled
                        if (configData.settings.sharedCounters && configData.settings.firebaseConfig) {
                            try {
                                if (!firebase.apps.length) {
                                    firebase.initializeApp(configData.settings.firebaseConfig);
                                }
                                databaseRef.current = firebase.database();
                                setFirebaseInitialized(true);
                            } catch (err) {
                                console.error('Firebase initialization error:', err);
                                alert('Firebase initialization failed. Check your firebaseConfig in config.json. Falling back to local storage.');
                                loadLocalCounts(configData);
                            }
                        } else {
                            // Load from localStorage if not using shared counters
                            loadLocalCounts(configData);
                        }
                    })
                    .catch(err => {
                        console.error('Failed to load config:', err);
                        alert('Failed to load configuration file. Please check config.json exists.');
                    });

                return () => {
                    // Cleanup Firebase listeners
                    Object.values(listenersRef.current).forEach(unsubscribe => {
                        if (typeof unsubscribe === 'function') unsubscribe();
                    });
                };
            }, []);

            const loadLocalCounts = (configData) => {
                const initialCounts = {};
                configData.counters.forEach(counter => {
                    if (configData.settings.persistData) {
                        const saved = localStorage.getItem(`counter_${counter.id}`);
                        initialCounts[counter.id] = saved ? parseInt(saved) : (counter.initialCount ?? 0);
                    } else {
                        initialCounts[counter.id] = counter.initialCount ?? 0;
                    }
                });
                setCounts(initialCounts);
            };

            // Set up Firebase listeners when initialized
            useEffect(() => {
                if (!firebaseInitialized || !config || !databaseRef.current) return;

                const sessionId = config.settings.counterSessionId || 'default';

                config.counters.forEach(counter => {
                    const counterRef = databaseRef.current.ref(`sessions/${sessionId}/counters/${counter.id}`);

                    // Listen for changes
                    const unsubscribe = counterRef.on('value', (snapshot) => {
                        const value = snapshot.val();
                        if (value !== null) {
                            setCounts(prev => ({ ...prev, [counter.id]: value }));
                        } else {
                            // Initialize counter in Firebase if it doesn't exist
                            counterRef.set(counter.initialCount ?? 0);
                        }
                    });

                    listenersRef.current[counter.id] = () => counterRef.off('value', unsubscribe);
                });
            }, [firebaseInitialized, config]);

            // Save counts to localStorage (for non-Firebase mode)
            useEffect(() => {
                if (!config?.settings.sharedCounters && config?.settings.persistData) {
                    Object.keys(counts).forEach(id => {
                        localStorage.setItem(`counter_${id}`, counts[id].toString());
                    });
                }
            }, [counts, config]);

            const increment = (counterId) => {
                if (config.settings.sharedCounters && databaseRef.current && firebaseInitialized) {
                    const sessionId = config.settings.counterSessionId || 'default';
                    const counterRef = databaseRef.current.ref(`sessions/${sessionId}/counters/${counterId}`);
                    counterRef.transaction((current) => (current || 0) + 1);
                } else {
                    setCounts(prev => ({
                        ...prev,
                        [counterId]: (prev[counterId] || 0) + 1
                    }));
                }
                setSessionCounts(prev => ({
                    ...prev,
                    [counterId]: (prev[counterId] || 0) + 1
                }));
            };

            const decrement = (counterId) => {
                if (config.settings.sharedCounters && databaseRef.current && firebaseInitialized) {
                    const sessionId = config.settings.counterSessionId || 'default';
                    const counterRef = databaseRef.current.ref(`sessions/${sessionId}/counters/${counterId}`);
                    counterRef.transaction((current) => Math.max(0, (current || 0) - 1));
                } else {
                    setCounts(prev => ({
                        ...prev,
                        [counterId]: Math.max(0, (prev[counterId] || 0) - 1)
                    }));
                }
                setSessionCounts(prev => ({
                    ...prev,
                    [counterId]: Math.max(0, (prev[counterId] || 0) - 1)
                }));
            };

            const resetCounter = (counterId) => {
                const shouldReset = config.settings.confirmReset
                    ? confirm(`Are you sure you want to reset this counter?`)
                    : true;

                if (shouldReset) {
                    if (config.settings.sharedCounters && databaseRef.current && firebaseInitialized) {
                        const sessionId = config.settings.counterSessionId || 'default';
                        const counterRef = databaseRef.current.ref(`sessions/${sessionId}/counters/${counterId}`);
                        counterRef.set(0);
                    } else {
                        setCounts(prev => ({ ...prev, [counterId]: 0 }));
                        if (config.settings.persistData) {
                            localStorage.removeItem(`counter_${counterId}`);
                        }
                    }
                    setSessionCounts(prev => ({ ...prev, [counterId]: 0 }));
                }
            };

            const resetAll = () => {
                const shouldReset = config.settings.confirmReset
                    ? confirm('Are you sure you want to reset ALL counters?')
                    : true;

                if (shouldReset) {
                    if (config.settings.sharedCounters && databaseRef.current && firebaseInitialized) {
                        const sessionId = config.settings.counterSessionId || 'default';
                        config.counters.forEach(counter => {
                            const counterRef = databaseRef.current.ref(`sessions/${sessionId}/counters/${counter.id}`);
                            counterRef.set(0);
                        });
                    } else {
                        const resetCounts = {};
                        config.counters.forEach(counter => {
                            resetCounts[counter.id] = 0;
                            if (config.settings.persistData) {
                                localStorage.removeItem(`counter_${counter.id}`);
                            }
                        });
                        setCounts(resetCounts);
                    }
                    setSessionCounts({});
                }
            };

            const getSessionDuration = () => {
                const now = new Date();
                return Math.floor((now - startTime) / 1000 / 60);
            };

            const getTotalCount = () => {
                return Object.values(counts).reduce((sum, count) => sum + count, 0);
            };

            const getTotalSessionCount = () => {
                return Object.values(sessionCounts).reduce((sum, count) => sum + count, 0);
            };

            const hexToRgba = (hex, alpha = 0.2) => {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            };

            if (!config) {
                return (
                    <div className="container">
                        <div className="loading">Loading configuration...</div>
                    </div>
                );
            }

            return (
                <div className="container">
                    <h1>{config.appTitle}</h1>

                    {config.counters.map(counter => (
                        <div key={counter.id} className="counter-card">
                            <div className="counter-header">
                                <span className="counter-emoji">{counter.emoji}</span>
                                <span className="counter-label">{counter.label}</span>
                            </div>

                            <div className="counter-display">
                                <div
                                    className="count"
                                    style={{ color: counter.color }}
                                >
                                    {counts[counter.id] || 0}
                                </div>
                            </div>

                            <div className="counter-buttons">
                                <button
                                    className="increment-btn"
                                    style={{
                                        background: counter.color,
                                        boxShadow: `0 2px 8px ${hexToRgba(counter.color, 0.3)}`
                                    }}
                                    onClick={() => increment(counter.id)}
                                >
                                    +1
                                </button>
                                <button
                                    style={{
                                        background: config.theme.accentColor,
                                        boxShadow: `0 2px 8px ${hexToRgba(config.theme.accentColor, 0.3)}`
                                    }}
                                    onClick={() => decrement(counter.id)}
                                >
                                    -1
                                </button>
                                <button
                                    style={{
                                        background: config.theme.dangerColor,
                                        boxShadow: `0 2px 8px ${hexToRgba(config.theme.dangerColor, 0.3)}`
                                    }}
                                    onClick={() => resetCounter(counter.id)}
                                >
                                    Reset
                                </button>
                            </div>
                        </div>
                    ))}

                    {(config.settings.showTotalStats || config.settings.showSessionStats) && (
                        <div className="global-stats">
                            <div className="stats-title">Overall Statistics</div>

                            {config.settings.showTotalStats && (
                                <div className="stat-item">
                                    <span>Total Count:</span>
                                    <span className="stat-value">{getTotalCount()}</span>
                                </div>
                            )}

                            {config.settings.showSessionStats && (
                                <>
                                    <div className="stat-item">
                                        <span>This Session:</span>
                                        <span className="stat-value">{getTotalSessionCount()}</span>
                                    </div>
                                    <div className="stat-item">
                                        <span>Session Duration:</span>
                                        <span className="stat-value">{getSessionDuration()} min</span>
                                    </div>
                                </>
                            )}

                            {config.settings.showRate && getSessionDuration() > 0 && (
                                <div className="stat-item">
                                    <span>Rate:</span>
                                    <span className="stat-value">
                                        {(getTotalSessionCount() / getSessionDuration()).toFixed(1)}/min
                                    </span>
                                </div>
                            )}
                        </div>
                    )}

                    <button
                        className="reset-all-btn"
                        style={{
                            background: config.theme.dangerColor,
                            boxShadow: `0 2px 8px ${hexToRgba(config.theme.dangerColor, 0.3)}`
                        }}
                        onClick={resetAll}
                    >
                        Reset All Counters
                    </button>
                </div>
            );
        }

        ReactDOM.render(<SwearCounter />, document.getElementById('root'));
    </script>
</body>
</html>
